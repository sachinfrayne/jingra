engine: elasticsearch

elasticsearch:
  url_env: ELASTICSEARCH_URL
  query_dump_directory: ./output

dataset: demo-vector

datasets:
  demo-vector:
    type: vector
    index_name: demo-vector
    schema_name: demo-vector-schema
    query_name: demo-vector-query
    vector_size: 384
    distance: cosine

    path:
      data_path: data/docs.ndjson
      queries_path: data/queries.ndjson

    data_mapping:
      id_field: id
      vector_field: embedding

    queries_mapping:
      query_vector_field: embedding
      ground_truth_field: ground_truth

    param_groups:
      recall@10:
        - { size: 10, k: 1, num_candidates: 1, oversample: 1 }
        - { size: 10, k: 2, num_candidates: 2, oversample: 1 }
        - { size: 10, k: 3, num_candidates: 3, oversample: 1 }
        - { size: 10, k: 4, num_candidates: 4, oversample: 1 }
        - { size: 10, k: 5, num_candidates: 5, oversample: 1 }
        - { size: 10, k: 6, num_candidates: 6, oversample: 1 }
        - { size: 10, k: 7, num_candidates: 7, oversample: 1 }
        - { size: 10, k: 8, num_candidates: 8, oversample: 1 }
        - { size: 10, k: 9, num_candidates: 9, oversample: 1 }
        - { size: 10, k: 10, num_candidates: 10, oversample: 1 }
        - { size: 10, k: 20, num_candidates: 20, oversample: 1 }
        - { size: 10, k: 50, num_candidates: 50, oversample: 1 }
        - { size: 10, k: 100, num_candidates: 100, oversample: 1 }
        - { size: 10, k: 200, num_candidates: 200, oversample: 1 }
        - { size: 10, k: 500, num_candidates: 500, oversample: 1 }
        - { size: 10, k: 1000, num_candidates: 1000, oversample: 1 }

load:
  threads: 4
  batch_size: 10
  queue_capacity: 10

evaluation:
  run_id: demo-vector
  warmup_workers: 1
  measurement_workers: 1
  warmup_rounds: 3
  measurement_rounds: 1

output:
  sinks:
    - type: elasticsearch
      config:
        url_env: SINK_URL
        index: jingra-results

analysis:
  run_id: demo-vector
  engines:
    - elasticsearch
  results_cluster:
    url_env: SINK_URL
    index: jingra-results
  output_directory: ./output
  generate_plots: true
  latency_metrics:
    - latency_median
    - latency_avg
