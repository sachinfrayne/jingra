services:
  # Data generation service - runs once to create datasets
  datagen:
    build:
      context: .
      dockerfile: Dockerfile.datagen
    container_name: datagen-lexical-demo
    volumes:
      - ./datasets:/app/datasets
    networks:
      - es-demo-net

  # Elasticsearch service
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.3.2
    container_name: es-lexical-demo
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
    networks:
      - es-demo-net

  # Jingra service - for load and eval commands
  jingra:
    build:
      context: ../..
      dockerfile: demos/elasticsearch-lexical-search/Dockerfile.jingra
    container_name: jingra-lexical-demo
    environment:
      - ES_URL=http://elasticsearch:9200
    volumes:
      - ./datasets:/app/datasets
      - ./config.yaml:/app/config.yaml
      - ./config:/app/jingra-config
    networks:
      - es-demo-net
    depends_on:
      elasticsearch:
        condition: service_healthy

networks:
  es-demo-net:
    driver: bridge
