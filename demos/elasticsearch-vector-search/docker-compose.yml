services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:${ES_VERSION}
    container_name: es-vector-demo
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
    networks:
      - es-demo-net

  jingra:
    build:
      context: ../..
      dockerfile: demos/elasticsearch-vector-search/Dockerfile
    container_name: jingra-vector-demo
    environment:
      - ES_URL=http://elasticsearch:9200
    volumes:
      - ./data:/app/data
      - ./config.yaml:/app/config.yaml
      - ./config:/app/jingra-config
      - ./analysis-output:/app/analysis-output
    networks:
      - es-demo-net
    depends_on:
      elasticsearch:
        condition: service_healthy

networks:
  es-demo-net:
    driver: bridge
