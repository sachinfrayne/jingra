engine: elasticsearch

elasticsearch:
  url_env: ELASTICSEARCH_URL
  query_dump_directory: ./output

dataset: demo-lexical

datasets:
  demo-lexical:
    type: lexical
    index_name: demo-lexical
    schema_name: demo-lexical-schema
    query_name: demo-lexical-query

    path:
      data_path: data/docs.ndjson
      queries_path: data/queries.ndjson

    data_mapping:
      id_field: id

    queries_mapping:
      query_text_field: query_text
      ground_truth_field: ground_truth

    param_groups:
      recall@10:
        - { size: 10 }

load:
  threads: 4
  batch_size: 10
  queue_capacity: 10

evaluation:
  run_id: demo-lexical
  warmup_workers: 1
  measurement_workers: 1
  warmup_rounds: 3
  measurement_rounds: 1

output:
  sinks:
    - type: elasticsearch
      config:
        url_env: SINK_URL
        index: jingra-results

analysis:
  run_id: demo-lexical
  engines:
    - elasticsearch
  results_cluster:
    url_env: SINK_URL
    index: jingra-results
  output_directory: ./output
  generate_plots: true
  latency_metrics:
    - latency_median
    - latency_avg
